<html>

<head>
    <link rel="stylesheet" href="index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <input id="toggle" type="checkbox">
        <h1>Metric/Imperial Unit Conversion</h1>
        <input type="number" id="input" placeholder="0" />
        <button id="convert-btn">Convert</button>
    </header>
    <main>
        <div class="conversion">
            <h2 class="conversion-header">Length (Meter/Feet)</h2>
            <p class="conversion-result" id="length"></p>
        </div>
        <div class="conversion">
            <h2 class="conversion-header">Volume (Liters/Gallons)</h2>
            <p class="conversion-result" id="volume"></p>
        </div>
        <div class="conversion">
            <h2 class="conversion-header">Mass (Kilograms/Pounds)</h2>
            <p class="conversion-result" id="mass"></p>
        </div>
    </main>
    <script src="index.js"></script>
</body>

</html>
